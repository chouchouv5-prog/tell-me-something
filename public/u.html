<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoie un message anonyme</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0a0a0a; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { max-width:480px; width:100%; padding:30px 20px; }
  h1 { font-size:1.8rem; text-align:center; margin-bottom:8px; }
  .subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:14px; }
  .card { background:#1a1a1a; border-radius:16px; padding:30px; }
  textarea { width:100%; padding:14px; background:#2a2a2a; border:1px solid #333; border-radius:10px; color:#fff; font-size:15px; margin-bottom:14px; outline:none; resize:none; }
  textarea:focus { border-color:#6366f1; }
  button { width:100%; padding:14px; background:#6366f1; color:#fff; border:none; border-radius:10px; font-size:16px; cursor:pointer; font-weight:600; }
  button:hover { background:#4f46e5; }
  .alert { padding:12px; border-radius:8px; margin-bottom:14px; font-size:14px; }
  .alert-success { background:#064e3b; color:#6ee7b7; }
  .alert-error { background:#450a0a; color:#fca5a5; }
  .footer { text-align:center; margin-top:20px; font-size:12px; color:#555; }
  .footer a { color:#6366f1; text-decoration:none; }
</style>
</head>
<body>
<div class="container">
  <h1>👁️ Tell Me Something</h1>
  <p class="subtitle" id="pageSubtitle">Envoie un message anonyme</p>

  <div class="card">
    <div id="alertBox"></div>
    <div id="formSection">
      <textarea id="messageText" rows="5" placeholder="Écris ton message ici... Tu resteras anonyme 🤫"></textarea>
      <button onclick="sendMessage()">Envoyer anonymement 🚀</button>
    </div>
  </div>

  <div class="footer">
    <p>💬 Crée ton propre lien sur <a href="/app/">Tell Me Something</a></p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bcnchlfbbbgkrqctlyrz.supabase.co';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

if (username) {
