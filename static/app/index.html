<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoie-moi un message anonyme !</title>

<!-- Ces meta tags seront mis à jour par le JS -->
<meta property="og:title" content="Envoie-moi un message anonyme !" />
<meta property="og:description" content="Clique et envoie-moi un message secret. Personne ne saura que c'est toi !" />
<meta property="og:image" content="https://tell-me-something.pages.dev/og-image.png" />

<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Envoie-moi un message anonyme !" />
<meta name="twitter:description" content="Clique et envoie-moi un message secret. Personne ne saura que c'est toi !" />
<meta name="twitter:image" content="https://tell-me-something.pages.dev/og-image.png" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0a0a0a; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.container { max-width:480px; width:100%; padding:30px 20px; }
h1 { font-size:1.8rem; text-align:center; margin-bottom:6px; }
.subtitle { text-align:center; color:#888; margin-bottom:30px; font-size:14px; }
.card { background:#1a1a1a; border-radius:16px; padding:28px; }
textarea { width:100%; background:#2a2a2a; border:1px solid #333; border-radius:10px; color:#fff; font-size:15px; padding:14px; resize:none; outline:none; min-height:120px; font-family:inherit; }
textarea:focus { border-color:#6366f1; }
button { width:100%; padding:14px; background:#6366f1; color:#fff; border:none; border-radius:10px; font-size:16px; cursor:pointer; font-weight:600; margin-top:12px; }
button:hover { background:#4f46e5; }
button:disabled { background:#444; cursor:not-allowed; }
.alert { padding:12px; border-radius:8px; margin-bottom:14px; font-size:14px; }
.alert-success { background:#064e3b; color:#6ee7b7; }
.alert-error { background:#450a0a; color:#fca5a5; }
.user-badge { text-align:center; font-size:13px; color:#6366f1; margin-bottom:16px; font-weight:600; }
.footer { text-align:center; margin-top:20px; font-size:12px; color:#444; }
.footer a { color:#6366f1; text-decoration:none; }
</style>
</head>
<body>
<div class="container">
  <h1>👁️ Tell Me Something</h1>
  <p class="subtitle">Messages anonymes, 100% gratuit</p>
  <div class="card">
    <div class="user-badge" id="userBadge">Chargement...</div>
    <div id="alertBox"></div>
    <textarea id="msgText" placeholder="Écris ton message anonyme ici..." maxlength="500"></textarea>
    <button id="sendBtn" onclick="sendMessage()">📨 Envoyer anonymement</button>
  </div>
  <p class="footer">Ton identité reste secrète • <a href="/app/">Créer mon compte</a></p>
</div>

<script>
const SUPABASE_URL = 'https://bcnchlfbbbgkrqctlyrz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Tvd6E1mW4OYLeIuuIpWeyw_tcntyeLb';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const username = params.get('u') || '';

if (username) {
  document.getElementById('userBadge').textContent = '📩 Envoie un message à @' + username;
  document.title = 'Envoie un message à @' + username;
} else {
  document.getElementById('userBadge').textContent = '❌ Utilisateur introuvable';
  document.getElementById('sendBtn').disabled = true;
}

// Touche Entrée (Ctrl+Entrée pour envoyer)
document.getElementById('msgText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) sendMessage();
});

async function sendMessage() {
  const content = document.getElementById('msgText').value.trim();
  const alertBox = document.getElementById('alertBox');
  const btn = document.getElementById('sendBtn');

  if (!content) {
    alertBox.innerHTML = '<div class="alert alert-error">Écris un message d\'abord !</div>';
    return;
  }
  if (!username) {
    alertBox.innerHTML = '<div class="alert alert-error">Utilisateur introuvable !</div>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Envoi...';

  const { error } = await sb.from('messages').insert({
    recipient_username: username,
    content: content
  });

  if (error) {
    alertBox.innerHTML = '<div class="alert alert-error">Erreur lors de l\'envoi. Réessaie !</div>';
    btn.disabled = false;
    btn.textContent = '📨 Envoyer anonymement';
  } else {
    alertBox.innerHTML = '<div class="alert alert-success">✅ Message envoyé ! Ton identité reste secrète.</div>';
    document.getElementById('msgText').value = '';
    btn.textContent = '📨 Envoyer un autre';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
